# To create the Renovate secret, generate a GitHub PAT with `repo` scope and run:
#
#   kubectl create secret generic renovate-secrets \
#     --namespace app-renovate \
#     --from-literal=RENOVATE_TOKEN=<your-github-pat> \
#     --dry-run=client -o yaml \
#     | kubeseal --format yaml \
#     > renovate/templates/sealed-secret.yaml
#
# Then replace this file with the generated output and commit.
