metrics-server:
  # API service configuration
  apiService:
    create: true

  # Resource configuration
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  # Extra arguments for metrics-server
  extraArgs:
    - --kubelet-insecure-tls
    - --kubelet-preferred-address-types=InternalIP

  # Number of replicas
  replicaCount: 1

  # Pod security context
  podSecurityContext:
    enabled: true
    runAsNonRoot: true
    runAsUser: 1001
    fsGroup: 1001

  containerSecurityContext:
    enabled: true
    runAsNonRoot: true
    runAsUser: 1001
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
