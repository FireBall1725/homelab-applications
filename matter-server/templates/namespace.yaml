apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    kubernetes.io/metadata.name: {{ .Release.Namespace }}
    # matter-server runs with hostNetwork + hostPort 5580 for Matter mDNS /
    # link-local IPv6 device discovery. The cluster-default baseline Pod
    # Security policy rejects that, so the namespace must opt into the
    # privileged PSA level (same as app-home-assistant).
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
