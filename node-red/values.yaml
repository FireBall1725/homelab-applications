#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart. You can check the default values/options here:
# https://github.com/k8s-at-home/library-charts/tree/main/charts/stable/common/values.yaml
#

image:
  # -- image repository
  repository: nodered/node-red
  # -- image tag
  # @default -- chart.appVersion
  tag: 4.1.8
  # -- image pull policy
  pullPolicy: IfNotPresent

# -- environment variables. See [image docs](https://nodered.org/docs/getting-started/docker) for more details.
# @default -- See below
env:
  # -- Set the container timezone
  TZ: America/Toronto
  # -- Node.js runtime arguments
  # NODE_OPTIONS:
  # -- Setting to `true` starts Node-RED with the projects feature enabled
  NODE_RED_ENABLE_PROJECTS: true
  # -- Setting to `true` starts Node-RED in safe (not running) mode
  # NODE_RED_ENABLE_SAFE_MODE:
  # -- Location of the flows configuration file.
  # If you set `FLOWS: ""` then the flow file can be set via the `flowFile` property in the `settings.js` file.
  # FLOWS: flows.json

# -- Configures service settings for the chart.
# @default -- See values.yaml
service:
  main:
    ports:
      http:
        port: 1880
      # -- Port exposing the node-red-mcp-server sidecar (supergateway,
      # streamableHttp transport). Targets the sidecar container's port 8000.
      mcp:
        enabled: true
        port: 8000
        protocol: TCP
        targetPort: 8000

ingress:
  # -- Enable and configure ingress settings for the chart under this key.
  # @default -- See values.yaml
  main:
    enabled: true
    hosts:
      - host: nodered.k8s.firekatt.ca
        paths:
          - path: /
            pathType: Prefix
  # -- Ingress for the node-red-mcp-server sidecar. Internal class only
  # (*.k8s.firekatt.ca resolves on the LAN). The /mcp endpoint is
  # unauthenticated; reachable at https://node-red-mcp.k8s.firekatt.ca/mcp.
  #
  # The Traefik middleware below forces the `Accept` request header to
  # `application/json, text/event-stream`. supergateway's streamableHttp
  # transport requires both media types, but Claude Code's `http` transport
  # currently omits the header (claude-agent-sdk issue #202), so without this
  # the server returns 406 (surfaced as a 400 by the cluster error-pages
  # middleware) and the connection fails. Injecting the header in transit makes
  # the buggy client compliant. Middleware ref format is
  # `<namespace>-<name>@kubernetescrd`.
  mcp:
    enabled: true
    ingressClassName: internal
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: app-node-red-node-red-mcp-accept@kubernetescrd
    hosts:
      - host: node-red-mcp.k8s.firekatt.ca
        paths:
          - path: /
            pathType: Prefix
            service:
              name: node-red
              port: 8000

# -- Configure persistence settings for the chart under this key.
# @default -- See values.yaml
persistence:
  data:
    enabled: true
    mountPath: /data
    accessMode: ReadWriteOnce
    size: 10Gi

initContainers:
  update-volume-permission:
    name: update-volume-permission
    image: busybox
    command: ["sh", "-c", "chown -R 1000:1000 /data"]
    volumeMounts:
      - name: data
        mountPath: /data
    securityContext:
      runAsUser: 0

# -- node-red-mcp-server sidecar.
#
# The upstream MCP server (npm: node-red-mcp-server) is stdio-only and ships no
# container image, so supergateway wraps it and exposes a network transport.
# supergateway runs `npx -y node-red-mcp-server@1.0.2` and bridges its stdio to
# streamableHttp on port 8000 (endpoint /mcp). The MCP server drives Node-RED's
# Admin API at http://localhost:1880 (same pod). Node-RED adminAuth is disabled,
# so no NODE_RED_TOKEN is required; add `--token $NODE_RED_TOKEN` from a
# SealedSecret here if adminAuth is ever enabled.
additionalContainers:
  node-red-mcp:
    name: node-red-mcp
    image: supercorp/supergateway:3.4.3
    imagePullPolicy: IfNotPresent
    args:
      - --stdio
      - npx -y node-red-mcp-server@1.0.2 --url http://localhost:1880
      - --outputTransport
      - streamableHttp
      # Stateful session management. Claude Code follows the full streamableHttp
      # lifecycle (session id + notifications/initialized + a GET listening
      # stream); supergateway's default stateless mode answers `initialize` but
      # then has no session for the follow-ups, so the client marks the
      # connection failed. The pod is single-replica, so there is no session
      # affinity concern. sessionTimeout reaps idle sessions so an ungraceful
      # client disconnect cannot leak them indefinitely.
      - --stateful
      - --sessionTimeout
      - "3600000"
      - --port
      - "8000"
      - --healthEndpoint
      - /healthz
    # No `ports:` block here on purpose: the common library already advertises
    # port 8000 on the pod via `service.main.ports.mcp`. The Service routes to
    # numeric targetPort 8000 (this sidecar binds it), so declaring it again
    # would only create a duplicate port-name warning.
    # Startup probe is generous: the first boot runs `npx` which downloads the
    # package before the listener comes up.
    startupProbe:
      httpGet:
        path: /healthz
        port: 8000
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 40
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8000
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8000
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 256Mi
