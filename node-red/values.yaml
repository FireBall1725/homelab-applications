#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart. You can check the default values/options here:
# https://github.com/k8s-at-home/library-charts/tree/main/charts/stable/common/values.yaml
#

image:
  # -- image repository
  repository: nodered/node-red
  # -- image tag
  # @default -- chart.appVersion
  tag: 4.1.11
  # -- image pull policy
  pullPolicy: IfNotPresent

# -- environment variables. See [image docs](https://nodered.org/docs/getting-started/docker) for more details.
# @default -- See below
env:
  # -- Set the container timezone
  TZ: America/Toronto
  # -- Node.js runtime arguments
  # NODE_OPTIONS:
  # -- Setting to `true` starts Node-RED with the projects feature enabled
  NODE_RED_ENABLE_PROJECTS: true
  # -- Setting to `true` starts Node-RED in safe (not running) mode
  # NODE_RED_ENABLE_SAFE_MODE:
  # -- Location of the flows configuration file.
  # If you set `FLOWS: ""` then the flow file can be set via the `flowFile` property in the `settings.js` file.
  # FLOWS: flows.json

# -- Configures service settings for the chart.
# @default -- See values.yaml
service:
  main:
    ports:
      http:
        port: 1880
      # -- Port exposing the node-red-mcp-server sidecar (supergateway,
      # SSE transport: GET /sse stream + POST /message). Targets port 8000.
      mcp:
        enabled: true
        port: 8000
        protocol: TCP
        targetPort: 8000

ingress:
  # -- Enable and configure ingress settings for the chart under this key.
  # @default -- See values.yaml
  main:
    enabled: true
    hosts:
      - host: nodered.k8s.firekatt.ca
        paths:
          - path: /
            pathType: Prefix
  # -- Ingress for the node-red-mcp-server sidecar. Internal class only
  # (*.k8s.firekatt.ca resolves on the LAN). Unauthenticated.
  #
  # SSE transport: the client connects to GET /sse (long-lived event stream)
  # and posts messages to /message. The `/` prefix path routes both to the
  # sidecar's port 8000. Connect endpoint: https://node-red-mcp.k8s.firekatt.ca/sse
  mcp:
    enabled: true
    ingressClassName: internal
    hosts:
      - host: node-red-mcp.k8s.firekatt.ca
        paths:
          - path: /
            pathType: Prefix
            service:
              name: node-red
              port: 8000

# -- Configure persistence settings for the chart under this key.
# @default -- See values.yaml
persistence:
  data:
    enabled: true
    mountPath: /data
    accessMode: ReadWriteOnce
    size: 10Gi

initContainers:
  update-volume-permission:
    name: update-volume-permission
    image: busybox
    command: ["sh", "-c", "chown -R 1000:1000 /data"]
    volumeMounts:
      - name: data
        mountPath: /data
    securityContext:
      runAsUser: 0

# -- node-red-mcp-server sidecar.
#
# The upstream MCP server (npm: node-red-mcp-server) is stdio-only and ships no
# container image, so supergateway wraps it and exposes a network transport.
# supergateway runs `npx -y node-red-mcp-server@1.0.2` and bridges its stdio to
# the SSE transport on port 8000 (GET /sse stream + POST /message). The MCP
# server drives Node-RED's Admin API at http://localhost:1880 (same pod).
# Node-RED adminAuth is disabled, so no NODE_RED_TOKEN is required; add
# `--token $NODE_RED_TOKEN` from a SealedSecret here if adminAuth is ever enabled.
#
# SSE rather than streamableHttp: supergateway's streamableHttp answers the
# initialize POST as an SSE stream, and Claude Code's client reuses that
# connection for the follow-up notification, which the cluster Traefik path
# turns into a 400 (the connection works locally without Traefik, and works via
# curl which opens fresh connections). SSE keeps the long-lived stream on a
# dedicated GET and posts short messages separately, avoiding that pattern.
additionalContainers:
  node-red-mcp:
    name: node-red-mcp
    image: supercorp/supergateway:3.4.3
    imagePullPolicy: IfNotPresent
    args:
      - --stdio
      - npx -y node-red-mcp-server@1.0.2 --url http://localhost:1880
      - --outputTransport
      - sse
      - --port
      - "8000"
      - --healthEndpoint
      - /healthz
    # No `ports:` block here on purpose: the common library already advertises
    # port 8000 on the pod via `service.main.ports.mcp`. The Service routes to
    # numeric targetPort 8000 (this sidecar binds it), so declaring it again
    # would only create a duplicate port-name warning.
    # Startup probe is generous: the first boot runs `npx` which downloads the
    # package before the listener comes up.
    startupProbe:
      httpGet:
        path: /healthz
        port: 8000
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 40
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8000
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8000
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 512Mi
