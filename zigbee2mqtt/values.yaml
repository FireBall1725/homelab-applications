#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart. You can check the default values/options here:
# https://github.com/k8s-at-home/library-charts/tree/main/charts/stable/common/values.yaml
#

image:
  # -- image repository
  repository: ghcr.io/koenkk/zigbee2mqtt
  # -- image tag
  tag: 
  # -- image pull policy
  pullPolicy: IfNotPresent

# -- environment variables. See [image docs](https://www.zigbee2mqtt.io/information/configuration.html#override-via-environment-variables) for more details.
# @default -- See below
env:
  # -- Set the data folder for Zigbee2MQTT.
  ZIGBEE2MQTT_DATA: /data
  # Coordinator: SLZB-06MU network coordinator (EmberZNet/ember) at 10.0.0.126:6638.
  # These override the serial/advanced block in /data/configuration.yaml on the PVC at runtime.
  ZIGBEE2MQTT_CONFIG_SERIAL_PORT: tcp://10.0.0.126:6638
  ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER: ember
  ZIGBEE2MQTT_CONFIG_SERIAL_BAUDRATE: "115200"
  ZIGBEE2MQTT_CONFIG_SERIAL_DISABLE_LED: "false"
  # 9 dBm: balanced for the amplified SLZB-06MU (CC2652P). Max (~20) risks raising
  # the 2.4GHz noise floor and self-interference; raise only if edge devices are weak.
  ZIGBEE2MQTT_CONFIG_ADVANCED_TRANSMIT_POWER: "9"
  # Channel 15: sits in the empty WiFi ch6 gap for a 2.4GHz WiFi plan that uses only
  # ch1 and ch11 (ch6 left clear). Was 11, co-channel with WiFi ch11.
  ZIGBEE2MQTT_CONFIG_ADVANCED_CHANNEL: "15"

# -- Configures service settings for the chart. Normally this does not need to be modified.
# @default -- See values.yaml
service:
  main:
    ports:
      http:
        port: 8080

ingress:
  # -- Enable and configure ingress settings for the chart under this key.
  # @default -- See values.yaml
  main:
    enabled: true
    hosts:
      - host: zigbee2mqtt.k8s.firekatt.ca
        paths:
          - path: /
            pathType: Prefix

# -- Configure persistence settings for the chart under this key.
# @default -- See values.yaml
persistence:
  data:
    enabled: true
    mountPath: /data
    accessMode: ReadWriteOnce
    size: 10Gi
# Coordinator is now a network adapter (SLZB-06MU over TCP), so the pod no longer
# needs a USB hostPath mount, privileged securityContext, node pinning, or the
# zwave-zigbee taint toleration. z2m is schedulable on any worker.
