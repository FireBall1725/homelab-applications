ntfy:
  # ntfy image configuration
  image:
    repository: binwiederhier/ntfy
    pullPolicy: IfNotPresent
    # Uses chart appVersion by default

  # Service configuration
  service:
    type: ClusterIP
    port: 80

  # Ingress configuration
  ingress:
    enabled: true
    className: internal
    annotations: {}
    hosts:
      - host: ntfy.k8s.firekatt.ca
        paths:
          - path: /
            pathType: Prefix
    tls: []

  # Persistent storage for message cache/history
  cache:
    enabled: true
    existingClaim: null
    volumeClaimSpec:
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn
      resources:
        requests:
          storage: 2Gi

  # ntfy server configuration
  # Reference: https://docs.ntfy.sh/config/
  config:
    sample:
      # Base URL for the server (used in email links, etc.)
      base-url: "https://ntfy.k8s.firekatt.ca"

      # Enable behind proxy mode (we're behind Traefik)
      behind-proxy: true

      # Logging
      log-level: "info"

      # Cache configuration
      cache-file: "/var/cache/ntfy/cache.db"
      cache-duration: "24h"

      # Attachment configuration
      attachment-cache-dir: "/var/cache/ntfy/attachments"
      attachment-total-size-limit: "1G"
      attachment-file-size-limit: "15M"
      attachment-expiry-duration: "24h"

      # Rate limiting (reasonable defaults for homelab)
      # These are per-visitor limits
      visitor-subscription-limit: 30
      visitor-request-limit-burst: 60
      visitor-request-limit-replenish: "5s"
      visitor-message-daily-limit: 1000

      # Web push (optional, for browser notifications)
      # web-push-public-key: ""
      # web-push-private-key: ""
      # web-push-email-address: ""

  # Resource limits appropriate for homelab
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

  # Pod security context
  podSecurityContext:
    fsGroup: 1000

  # Container security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000

  # Backup configuration (disabled - using Longhorn backups instead)
  backup:
    enabled: false
