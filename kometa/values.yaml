common:
  # Use CronJob controller type
  controller:
    type: cronjob
    cronjob:
      schedule: "0 0 * * *"  # Daily at midnight UTC
      successfulJobsHistory: 3
      failedJobsHistory: 3

  # Container image
  image:
    repository: kometateam/kometa
    tag: v2.1.0
    pullPolicy: IfNotPresent

  # Command and args
  command:
    - "/scripts/run.sh"

  args:
    - "--run"
    - "--read-only-config"

  # Pod security context
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # Mount ConfigMaps as files
  persistence:
    config:
      enabled: true
      type: custom
      mountPath: /config/config.yml
      subPath: config.yml
      readOnly: true
      volumeSpec:
        configMap:
          name: '{{ include "common.names.fullname" . }}-config'

    movies:
      enabled: true
      type: custom
      mountPath: /config/movies.yaml
      subPath: movies.yaml
      readOnly: true
      volumeSpec:
        configMap:
          name: '{{ include "common.names.fullname" . }}-movies'

    tv:
      enabled: true
      type: custom
      mountPath: /config/tv.yaml
      subPath: tv.yaml
      readOnly: true
      volumeSpec:
        configMap:
          name: '{{ include "common.names.fullname" . }}-tv'

    media:
      enabled: true
      type: nfs
      mountPath: /media
      readOnly: true
      server: 10.0.1.241
      path: /volume2/media

  # Resource limits for homelab
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# Kometa configuration files
# IMPORTANT: Replace YOUR_*_HERE values with actual tokens
# For production, use Sealed Secrets for sensitive data (see SECRETS.md)
config: |
  libraries:
    Movies:
      library_name: Movies  # Name of your Movies library in Plex
      collection_files:
        - file: /config/movies.yaml
    TV Shows:
      library_name: TV Shows  # Name of your TV Shows library in Plex
      collection_files:
        - file: /config/tv.yaml

  plex:
    url: http://plex.default.svc.cluster.local:32400
    token: YOUR_PLEX_TOKEN_HERE  # TODO: Replace or use sealed secret

  tmdb:
    apikey: YOUR_TMDB_API_KEY_HERE  # TODO: Replace or use sealed secret

  settings:
    cache: true
    cache_expiration: 60
    asset_directory: /config/assets
    asset_folders: true
    asset_depth: 0
    create_asset_folders: false
    prioritize_assets: false
    dimensional_asset_rename: false
    download_url_assets: false
    show_missing_season_assets: false
    show_missing_episode_assets: false
    show_asset_not_needed: true
    sync_mode: append
    minimum_items: 1
    delete_below_minimum: false
    delete_not_scheduled: false
    run_order:
      - operations
      - metadata
      - collections
      - overlays
    verify_ssl: true
    check_nightly: false

movieConfig: |
  collections:
    Trending:
      trakt_trending: 30
      sort_title: "!001_Trending"
      sync_mode: sync
      collection_order: custom
      summary: Movies trending on Trakt right now

    Popular:
      trakt_popular: 50
      sort_title: "!002_Popular"
      sync_mode: sync
      collection_order: custom
      summary: Most popular movies on Trakt

    Top Rated:
      imdb_chart: top_movies
      sort_title: "!003_Top Rated"
      sync_mode: sync
      collection_order: custom
      summary: Top rated movies on IMDb

tvConfig: |
  collections:
    Trending:
      trakt_trending: 30
      sort_title: "!001_Trending"
      sync_mode: sync
      collection_order: custom
      summary: TV shows trending on Trakt right now

    Popular:
      trakt_popular: 50
      sort_title: "!002_Popular"
      sync_mode: sync
      collection_order: custom
      summary: Most popular TV shows on Trakt

    Top Rated:
      imdb_chart: top_shows
      sort_title: "!003_Top Rated"
      sync_mode: sync
      collection_order: custom
      summary: Top rated TV shows on IMDb
