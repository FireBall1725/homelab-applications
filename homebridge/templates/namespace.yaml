apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    kubernetes.io/metadata.name: {{ .Release.Namespace }}
    # homebridge runs with hostNetwork so it can emit HAP mDNS / Bonjour on the
    # LAN for Apple Home discovery. The cluster-default baseline Pod Security
    # policy rejects hostNetwork, so the namespace must opt into the privileged
    # PSA level (same as app-matter-server and app-home-assistant).
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
