apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: operator-oauth
  namespace: app-tailscale
spec:
  encryptedData:
    # Using pre-generated auth key instead of OAuth
    # Empty client_id tells operator to use client_secret as auth key
    client_id: ""
    client_secret: 
  template:
    metadata:
      name: operator-oauth
      namespace: app-tailscale
      labels:
        app: tailscale-operator
    type: Opaque
