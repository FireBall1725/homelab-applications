{{- if .Values.mcpServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bookstack.fullname" . }}-mcp
  labels:
    app.kubernetes.io/name: {{ include "bookstack.name" . }}-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp-server
spec:
  replicas: {{ .Values.mcpServer.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bookstack.name" . }}-mcp
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "bookstack.name" . }}-mcp
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mcp-server
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: mcp-server
          image: "{{ .Values.mcpServer.image.repository }}:{{ .Values.mcpServer.image.tag }}"
          imagePullPolicy: {{ .Values.mcpServer.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mcpServer.port }}
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .Values.mcpServer.port }}"
            - name: BOOKSTACK_BASE_URL
              value: "{{ .Values.mcpServer.bookstackUrl }}"
            - name: BOOKSTACK_ENABLE_WRITE
              value: "{{ .Values.mcpServer.enableWrite }}"
            - name: BOOKSTACK_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcpServer.existingSecret }}
                  key: BOOKSTACK_TOKEN_ID
            - name: BOOKSTACK_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcpServer.existingSecret }}
                  key: BOOKSTACK_TOKEN_SECRET
          livenessProbe:
            httpGet:
              path: {{ .Values.mcpServer.healthCheck.path }}
              port: http
            initialDelaySeconds: {{ .Values.mcpServer.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.mcpServer.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.mcpServer.healthCheck.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.mcpServer.healthCheck.path }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.mcpServer.resources | nindent 12 }}
{{- end }}
