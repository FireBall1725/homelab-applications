{{- if .Values.mcpServer.enabled }}
# PLACEHOLDER SEALED SECRET
# This sealed secret contains API credentials for the BookStack MCP server.
#
# After deploying BookStack:
# 1. Log into BookStack at https://docs.k8s.firekatt.ca
# 2. Go to Settings > Users > [your user] > API Tokens
# 3. Create a new API token with appropriate permissions
# 4. Generate a new sealed secret with the token values:
#
#    kubectl create secret generic bookstack-mcp-api-credentials \
#      --namespace=app-bookstack \
#      --from-literal=BOOKSTACK_TOKEN_ID='your-token-id' \
#      --from-literal=BOOKSTACK_TOKEN_SECRET='your-token-secret' \
#      --dry-run=client -o yaml | \
#      kubeseal -o yaml > bookstack/templates/sealed-secret-mcp.yaml
#
# 5. Replace this file with the output and commit
#
# For now, this placeholder allows the chart to be deployed.
# The MCP server will fail health checks until valid credentials are provided.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.mcpServer.existingSecret }}
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    # PLACEHOLDER - replace with actual sealed values
    # These are dummy encrypted values that will not decrypt to valid tokens
    BOOKSTACK_TOKEN_ID: AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==
    BOOKSTACK_TOKEN_SECRET: AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==
  template:
    metadata:
      name: {{ .Values.mcpServer.existingSecret }}
      namespace: {{ .Release.Namespace }}
    type: Opaque
{{- end }}
