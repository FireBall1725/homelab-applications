# BookStack configuration
# https://hub.docker.com/r/linuxserver/bookstack

image:
  repository: lscr.io/linuxserver/bookstack
  tag: latest
  pullPolicy: IfNotPresent

# MariaDB sidecar configuration
mariadb:
  image:
    repository: lscr.io/linuxserver/mariadb
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

# Namespace for the deployment
namespace: app-bookstack

# Ingress configuration
ingress:
  enabled: true
  className: internal
  host: docs.k8s.firekatt.ca

# Persistence configuration
persistence:
  enabled: true
  storageClass: longhorn
  size: 20Gi
  accessMode: ReadWriteOnce

# Environment variables for linuxserver/bookstack
env:
  # LinuxServer.io standard variables
  PUID: "1000"
  PGID: "1000"
  TZ: "America/Edmonton"
  # BookStack application key (encryption salt)
  APP_KEY: "base64:Vo9D8mBCHfL+SYveo+YRpoxF9TIF2hjLF5p0JxcwB90="
  # BookStack application URL
  APP_URL: "https://docs.k8s.firekatt.ca"
  # Database configuration (connects to MariaDB sidecar via localhost)
  DB_HOST: "127.0.0.1"
  DB_PORT: "3306"
  DB_DATABASE: "bookstackapp"
  DB_USERNAME: "bookstack"
  DB_PASSWORD: "bookstack"

# MariaDB environment variables
mariadbEnv:
  PUID: "1000"
  PGID: "1000"
  TZ: "America/Edmonton"
  MYSQL_ROOT_PASSWORD: "bookstack-root"
  MYSQL_DATABASE: "bookstackapp"
  MYSQL_USER: "bookstack"
  MYSQL_PASSWORD: "bookstack"

# Service configuration
service:
  type: ClusterIP
  port: 80

# Resource limits (adjust as needed for homelab)
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

# Replica count
replicaCount: 1

# Node selector (optional)
nodeSelector: {}

# Tolerations (optional)
tolerations: []

# Affinity (optional)
affinity: {}
