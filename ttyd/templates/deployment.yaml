apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ttyd.fullname" . }}
  namespace: {{ include "ttyd.namespace" . }}
  labels:
    {{- include "ttyd.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ttyd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.pod.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ttyd.selectorLabels" . | nindent 8 }}
        {{- with .Values.pod.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "ttyd.serviceAccountName" . }}
      {{- end }}
      containers:
        # Use node:alpine as base since we need Node.js for Claude Code
        - name: ttyd
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              # Install ttyd and tools
              apk add --no-cache ttyd curl kubectl helm git zsh zsh-vcs

              # Install Claude Code CLI
              npm install -g @anthropic-ai/claude-code

              # Setup zsh with oh-my-zsh
              sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended || true

              # Create .zshrc with Claude Code setup
              cat > /root/.zshrc <<'EOF'
              export ZSH="$HOME/.oh-my-zsh"
              ZSH_THEME="robbyrussell"
              plugins=(git kubectl helm)
              source $ZSH/oh-my-zsh.sh 2>/dev/null || true

              # Environment
              export ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}"

              # Claude Code aliases
              alias cc='claude-code'
              alias claude='claude-code'

              # Welcome message
              echo ""
              echo "🤖 Claude Code Terminal"
              echo "Type 'claude-code' or 'cc' to start"
              echo ""
              EOF

              # Start ttyd (no auth - internal ingress only)
              exec ttyd \
                --port 7681 \
                {{- if not .Values.ttyd.readonly }}
                --writable \
                {{- end }}
                {{- if not .Values.ttyd.checkOrigin }}
                --check-origin \
                {{- end }}
                --max-clients {{ .Values.ttyd.maxClients }} \
                --terminal-type {{ .Values.ttyd.terminalType }} \
                /bin/zsh
          ports:
            - name: http
              containerPort: 7681
              protocol: TCP
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName }}
                  key: PASSWORD
            {{- if .Values.claudeCode.enabled }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.claudeCode.apiKeySecret }}
                  key: ANTHROPIC_API_KEY
            {{- end }}
            - name: TERM
              value: {{ .Values.ttyd.terminalType }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: home
              mountPath: /root
            {{- if .Values.rbac.create }}
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
            {{- end }}
      volumes:
        - name: home
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ttyd.fullname" . }}-home
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.rbac.create }}
        - name: kube-api-access
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3607
                  path: token
              - configMap:
                  items:
                    - key: ca.crt
                      path: ca.crt
                  name: kube-root-ca.crt
              - downwardAPI:
                  items:
                    - fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
                      path: namespace
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
