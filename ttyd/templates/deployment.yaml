apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ttyd.fullname" . }}
  namespace: {{ include "ttyd.namespace" . }}
  labels:
    {{- include "ttyd.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ttyd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.pod.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ttyd.selectorLabels" . | nindent 8 }}
        {{- with .Values.pod.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "ttyd.serviceAccountName" . }}
      {{- end }}
      containers:
        # Use node:20 (Debian-based) for apt-get support
        - name: ttyd
          image: node:20-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -e  # Exit on error

              # Update apt and install tools
              apt-get update
              apt-get install -y --no-install-recommends \
                curl \
                git \
                zsh \
                vim \
                wget \
                ca-certificates \
                build-essential \
                neofetch

              # Install ttyd from GitHub releases
              TTYD_VERSION=1.7.7
              curl -Lo /usr/local/bin/ttyd https://github.com/tsl0922/ttyd/releases/download/${TTYD_VERSION}/ttyd.x86_64
              chmod +x /usr/local/bin/ttyd

              # Install kubectl
              curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x kubectl
              mv kubectl /usr/local/bin/

              # Install helm
              curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

              # Install Claude Code CLI globally
              echo "Installing Claude Code CLI..."
              npm install -g @anthropic-ai/claude-code

              # Setup zsh with oh-my-zsh
              export RUNZSH=no
              export CHSH=no
              sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended || true

              # Configure Wiki.js MCP server using Claude CLI
              echo "Configuring Wiki.js MCP server..."
              claude mcp add --transport http wikijs http://wikijs-mcp.app-wikijs.svc.cluster.local:3200/mcp || true

              # Create .zshrc with Claude Code setup
              cat > /root/.zshrc <<'EOF'
              export ZSH="$HOME/.oh-my-zsh"
              ZSH_THEME="robbyrussell"
              plugins=(git kubectl helm)

              # Load oh-my-zsh
              if [ -f "$ZSH/oh-my-zsh.sh" ]; then
                source $ZSH/oh-my-zsh.sh
              fi

              # Environment
              export ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}"
              export PATH="/usr/local/bin:$PATH"

              # Claude Code alias
              alias cc='claude'

              # Welcome message
              echo ""
              echo "🤖 Claude Code Terminal (Debian)"
              echo "• Type 'claude' or 'cc' to start Claude Code"
              echo "• Use 'apt-get' to install packages"
              echo "• kubectl and helm are pre-installed"
              echo ""
              EOF

              # Start ttyd (no auth - internal ingress only)
              exec ttyd \
                --port 7681 \
                {{- if not .Values.ttyd.readonly }}
                --writable \
                {{- end }}
                {{- if not .Values.ttyd.checkOrigin }}
                --check-origin \
                {{- end }}
                --max-clients {{ .Values.ttyd.maxClients }} \
                --terminal-type {{ .Values.ttyd.terminalType }} \
                /bin/zsh
          ports:
            - name: http
              containerPort: 7681
              protocol: TCP
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName }}
                  key: PASSWORD
            {{- if .Values.claudeCode.enabled }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.claudeCode.apiKeySecret }}
                  key: ANTHROPIC_API_KEY
            {{- end }}
            - name: TERM
              value: {{ .Values.ttyd.terminalType }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: home
              mountPath: /root
            {{- if .Values.rbac.create }}
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
            {{- end }}
      volumes:
        - name: home
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ttyd.fullname" . }}-home
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.rbac.create }}
        - name: kube-api-access
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3607
                  path: token
              - configMap:
                  items:
                    - key: ca.crt
                      path: ca.crt
                  name: kube-root-ca.crt
              - downwardAPI:
                  items:
                    - fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
                      path: namespace
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
