# Terminus web server (Puma/Hanami)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terminus-web
  labels:
    app.kubernetes.io/name: terminus
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: terminus
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: terminus
        app.kubernetes.io/component: web
    spec:
      initContainers:
        # Wait for PostgreSQL to be ready before starting
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.postgres.clusterName }}-rw 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
        # Wait for Valkey to be ready
        - name: wait-for-valkey
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z terminus-valkey {{ .Values.valkey.port }}; do
                echo "Waiting for Valkey..."
                sleep 2
              done
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          env:
            - name: HANAMI_PORT
              value: "{{ .Values.web.port }}"
            - name: API_URI
              value: "{{ .Values.web.apiUri }}"
            - name: APP_SETUP
              value: "true"
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: terminus-app
                  key: app-secret
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.clusterName }}-app
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.clusterName }}-app
                  key: password
            - name: DATABASE_URL
              value: "postgres://$(DATABASE_USER):$(DATABASE_PASSWORD)@{{ .Values.postgres.clusterName }}-rw:5432/{{ .Values.postgres.database }}"
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: terminus-valkey
                  key: password
            - name: KEYVALUE_URL
              value: "redis://:$(VALKEY_PASSWORD)@terminus-valkey:{{ .Values.valkey.port }}/{{ .Values.valkey.database }}"
          ports:
            - containerPort: {{ .Values.web.port }}
              name: http
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /up
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /up
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: uploads
              mountPath: /app/public/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: terminus-uploads
