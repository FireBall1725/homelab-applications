# Application secret for Terminus
# Used for session, cookie, and CSRF protection
apiVersion: v1
kind: Secret
metadata:
  name: terminus-app
  labels:
    app.kubernetes.io/name: terminus
    app.kubernetes.io/component: web
type: Opaque
data:
  # Generated app secret - replace with a sealed secret for better security
  app-secret: {{ randAlphaNum 64 | b64enc }}
