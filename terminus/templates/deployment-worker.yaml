# Terminus Sidekiq worker (background jobs)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terminus-worker
  labels:
    app.kubernetes.io/name: terminus
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: terminus
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: terminus
        app.kubernetes.io/component: worker
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.postgres.clusterName }}-rw 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
        - name: wait-for-valkey
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z terminus-valkey {{ .Values.valkey.port }}; do
                echo "Waiting for Valkey..."
                sleep 2
              done
      containers:
        - name: worker
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          command:
            - bundle
            - exec
            - sidekiq
            - -r
            - ./config/sidekiq.rb
          env:
            - name: HANAMI_PORT
              value: "{{ .Values.web.port }}"
            - name: API_URI
              value: "{{ .Values.web.apiUri }}"
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: terminus-app
                  key: app-secret
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.clusterName }}-app
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.clusterName }}-app
                  key: password
            - name: DATABASE_URL
              value: "postgres://$(DATABASE_USER):$(DATABASE_PASSWORD)@{{ .Values.postgres.clusterName }}-rw:5432/{{ .Values.postgres.database }}"
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: terminus-valkey
                  key: password
            - name: KEYVALUE_URL
              value: "redis://:$(VALKEY_PASSWORD)@terminus-valkey:{{ .Values.valkey.port }}/{{ .Values.valkey.database }}"
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - pgrep
                - -f
                - sidekiq
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: uploads
              mountPath: /app/public/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: terminus-uploads
