# PLACEHOLDER — DO NOT MERGE AS-IS
#
# This file must be regenerated locally with kubeseal before merging the PR.
# The encryptedData below is intentionally invalid; ArgoCD will fail to sync
# until you replace this file with a real sealed secret.
#
# Generate the encryption key (32+ random bytes, base64-trimmed) and seal it:
#
#   ENC_KEY="$(openssl rand -base64 48 | tr -d '=+/' | head -c 48)"
#   kubectl create secret generic n8n-encryption-key \
#     --namespace=app-n8n \
#     --from-literal=N8N_ENCRYPTION_KEY="$ENC_KEY" \
#     --dry-run=client -o yaml | \
#     kubeseal -o yaml > n8n/templates/sealed-secret-encryption-key.yaml
#
# Save $ENC_KEY in your password manager — losing it means losing access to all
# stored credentials in n8n.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: n8n-encryption-key
  namespace: app-n8n
spec:
  encryptedData:
    N8N_ENCRYPTION_KEY: REPLACE_ME_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: n8n-encryption-key
      namespace: app-n8n
