{{- if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "code-server.serviceAccountName" . }}
  namespace: {{ include "code-server.namespace" . }}
  labels:
    {{- include "code-server.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

{{- if .Values.rbac.create }}
---
# ClusterRole for code-server to manage cluster resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "code-server.fullname" . }}-cluster-admin
  labels:
    {{- include "code-server.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.rules | nindent 2 }}
---
# ClusterRoleBinding to give code-server admin access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "code-server.fullname" . }}-cluster-admin
  labels:
    {{- include "code-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "code-server.fullname" . }}-cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "code-server.serviceAccountName" . }}
    namespace: {{ include "code-server.namespace" . }}
{{- end }}
