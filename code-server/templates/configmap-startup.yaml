apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "code-server.fullname" . }}-startup
  namespace: {{ include "code-server.namespace" . }}
  labels:
    {{- include "code-server.labels" . | nindent 4 }}
data:
  01-install-tools.sh: |
    #!/bin/bash
    set -e
    echo "=== Code-Server Custom Init Script ==="

    # Wait for code-server to be ready
    sleep 5

    # Install Node.js if not present (needed for Claude Code)
    if ! command -v node &> /dev/null; then
      echo "Installing Node.js..."
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      apt-get install -y nodejs
    fi

    # Install kubectl
    echo "Installing kubectl..."
    if ! command -v kubectl &> /dev/null; then
      curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      chmod +x kubectl
      mv kubectl /usr/local/bin/
    fi
    echo "kubectl version: $(kubectl version --client --short 2>/dev/null || kubectl version --client)"

    # Configure kubectl to use in-cluster config
    echo "Configuring kubectl for in-cluster access..."
    mkdir -p /config/.kube
    cat > /config/.kube/config << 'KUBECONFIG'
    apiVersion: v1
    kind: Config
    clusters:
    - cluster:
        certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        server: https://kubernetes.default.svc
      name: in-cluster
    contexts:
    - context:
        cluster: in-cluster
        namespace: default
        user: code-server
      name: in-cluster
    current-context: in-cluster
    users:
    - name: code-server
      user:
        tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    KUBECONFIG
    chown -R abc:abc /config/.kube

    # Install Helm
    echo "Installing Helm..."
    if ! command -v helm &> /dev/null; then
      curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    fi
    echo "helm version: $(helm version --short)"

    # Install kubeseal
    echo "Installing kubeseal..."
    if ! command -v kubeseal &> /dev/null; then
      KUBESEAL_VERSION=$(curl -s https://api.github.com/repos/bitnami-labs/sealed-secrets/releases/latest | grep tag_name | cut -d '"' -f 4)
      curl -OL "https://github.com/bitnami-labs/sealed-secrets/releases/download/${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION#v}-linux-amd64.tar.gz"
      tar -xvzf kubeseal-*.tar.gz kubeseal
      mv kubeseal /usr/local/bin/
      rm -f kubeseal-*.tar.gz
    fi
    echo "kubeseal version: $(kubeseal --version)"

    # Install talosctl
    echo "Installing talosctl..."
    if ! command -v talosctl &> /dev/null; then
      curl -sL https://talos.dev/install | sh
    fi
    echo "talosctl version: $(talosctl version --client 2>/dev/null | head -1 || echo 'installed')"

    # Install yq
    echo "Installing yq..."
    if ! command -v yq &> /dev/null; then
      curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
      chmod +x /usr/local/bin/yq
    fi

    # Install jq if not present
    echo "Installing jq..."
    apt-get update -qq && apt-get install -y -qq jq

    echo "=== Tool installation complete ==="

  02-install-claude-code.sh: |
    #!/bin/bash
    set -e
    echo "=== Installing Claude Code CLI ==="

    # Install Claude Code CLI globally
    npm install -g @anthropic-ai/claude-code || {
      echo "Warning: Claude Code CLI installation failed. You can install it manually later."
      echo "Run: npm install -g @anthropic-ai/claude-code"
    }

    # Verify installation
    if command -v claude &> /dev/null; then
      echo "Claude Code CLI installed successfully"
      claude --version || true
    else
      echo "Claude Code CLI not found in PATH. It may need a shell restart."
    fi

    echo "=== Claude Code installation complete ==="

  03-clone-repos.sh: |
    #!/bin/bash
    set -e
    echo "=== Cloning Git Repositories ==="

    # Ensure workspace directory exists and is owned by abc user
    mkdir -p /config/workspace
    chown abc:abc /config/workspace

    cd /config/workspace

    {{- range .Values.git.repositories }}
    if [ ! -d "{{ .name }}" ]; then
      echo "Cloning {{ .name }}..."
      su - abc -c "cd /config/workspace && git clone {{ .url }} {{ .name }}" || echo "Warning: Failed to clone {{ .name }}"
    else
      echo "{{ .name }} already exists, skipping clone"
    fi
    {{- end }}

    # Set git config if provided
    {{- if .Values.git.user.name }}
    su - abc -c "git config --global user.name '{{ .Values.git.user.name }}'"
    {{- end }}
    {{- if .Values.git.user.email }}
    su - abc -c "git config --global user.email '{{ .Values.git.user.email }}'"
    {{- end }}

    echo "=== Git repository setup complete ==="

  04-vscode-settings.sh: |
    #!/bin/bash
    set -e
    echo "=== Configuring VS Code Settings ==="

    # Create VS Code settings directory
    mkdir -p /config/data/User
    chown -R abc:abc /config/data

    # Create default settings if not exist
    SETTINGS_FILE="/config/data/User/settings.json"
    if [ ! -f "$SETTINGS_FILE" ]; then
      cat > "$SETTINGS_FILE" << 'SETTINGS'
    {
      "workbench.colorTheme": "Default Dark Modern",
      "editor.fontSize": 14,
      "editor.tabSize": 2,
      "editor.formatOnSave": true,
      "editor.minimap.enabled": false,
      "terminal.integrated.defaultProfile.linux": "bash",
      "terminal.integrated.fontSize": 13,
      "files.autoSave": "afterDelay",
      "files.autoSaveDelay": 1000,
      "git.autofetch": true,
      "git.confirmSync": false,
      "explorer.confirmDelete": false,
      "explorer.confirmDragAndDrop": false,
      "kubernetes.namespace": "default",
      "redhat.telemetry.enabled": false,
      "telemetry.telemetryLevel": "off"
    }
    SETTINGS
      chown abc:abc "$SETTINGS_FILE"
    fi

    echo "=== VS Code settings configured ==="
