apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "code-server.fullname" . }}
  namespace: {{ include "code-server.namespace" . }}
  labels:
    {{- include "code-server.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "code-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.pod.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "code-server.selectorLabels" . | nindent 8 }}
        {{- with .Values.pod.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "code-server.serviceAccountName" . }}
      {{- end }}
      securityContext:
        fsGroup: {{ .Values.linuxserver.pgid }}
      containers:
        - name: code-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8443
              protocol: TCP
          env:
            - name: PUID
              value: "{{ .Values.linuxserver.puid }}"
            - name: PGID
              value: "{{ .Values.linuxserver.pgid }}"
            - name: TZ
              value: "{{ .Values.linuxserver.tz }}"
            # Default workspace
            - name: DEFAULT_WORKSPACE
              value: /config/workspace
            # Disable built-in auth - we use password from secret
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName }}
                  key: PASSWORD
            # Proxy domain for proper websocket handling
            - name: PROXY_DOMAIN
              value: "{{ .Values.ingress.host }}"
            {{- if .Values.claudeCode.enabled }}
            # Anthropic API key for Claude Code
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.claudeCode.apiKeySecret }}
                  key: ANTHROPIC_API_KEY
            {{- end }}
            # Install extensions on startup
            - name: DOCKER_MODS
              value: "linuxserver/mods:code-server-extension-arguments"
            - name: VSCODE_EXTENSION_IDS
              value: {{ .Values.extensions | join "|" | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 300
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 300
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: workspace
              mountPath: /config/workspace
            - name: startup-script
              mountPath: /custom-cont-init.d
              readOnly: true
            {{- if .Values.rbac.create }}
            # Mount service account token for kubectl access
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          {{- if .Values.persistence.config.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "code-server.fullname" . }}-config
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: workspace
          {{- if .Values.persistence.workspace.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "code-server.fullname" . }}-workspace
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: startup-script
          configMap:
            name: {{ include "code-server.fullname" . }}-startup
            defaultMode: 0755
        {{- if .Values.rbac.create }}
        - name: kube-api-access
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3607
                  path: token
              - configMap:
                  items:
                    - key: ca.crt
                      path: ca.crt
                  name: kube-root-ca.crt
              - downwardAPI:
                  items:
                    - fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
                      path: namespace
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
