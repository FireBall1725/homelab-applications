# IMPORTANT: These sealed secrets contain PLACEHOLDER values!
# Before deploying, you must regenerate these with your actual secrets.
#
# To create the password sealed secret:
#   echo -n 'YOUR_SECURE_PASSWORD' | kubectl create secret generic code-server-auth \
#     --namespace=app-code-server --dry-run=client --from-file=PASSWORD=/dev/stdin -o yaml | \
#     kubeseal --controller-name=sealed-secrets-controller --controller-namespace=kube-system --format yaml
#
# To create the Anthropic API key sealed secret:
#   echo -n 'sk-ant-YOUR_API_KEY' | kubectl create secret generic code-server-anthropic-key \
#     --namespace=app-code-server --dry-run=client --from-file=ANTHROPIC_API_KEY=/dev/stdin -o yaml | \
#     kubeseal --controller-name=sealed-secrets-controller --controller-namespace=kube-system --format yaml
#
# Then replace the encryptedData sections below with your generated values.

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.auth.secretName }}
  namespace: {{ include "code-server.namespace" . }}
  labels:
    {{- include "code-server.labels" . | nindent 4 }}
spec:
  encryptedData:
    # PLACEHOLDER - Replace with your sealed password
    PASSWORD: 
  template:
    metadata:
      name: {{ .Values.auth.secretName }}
      namespace: {{ include "code-server.namespace" . }}
      labels:
        {{- include "code-server.labels" . | nindent 8 }}

{{- if .Values.claudeCode.enabled }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.claudeCode.apiKeySecret }}
  namespace: {{ include "code-server.namespace" . }}
  labels:
    {{- include "code-server.labels" . | nindent 4 }}
spec:
  encryptedData:
    # PLACEHOLDER - Replace with your sealed Anthropic API key
    ANTHROPIC_API_KEY: 
  template:
    metadata:
      name: {{ .Values.claudeCode.apiKeySecret }}
      namespace: {{ include "code-server.namespace" . }}
      labels:
        {{- include "code-server.labels" . | nindent 8 }}
{{- end }}
