# Code-server with Claude Code configuration
# VS Code in the browser for homelab management

namespace: app-code-server

image:
  # Using linuxserver.io code-server image as base
  # It has better support for adding packages and extensions
  repository: lscr.io/linuxserver/code-server
  tag: "latest"
  pullPolicy: IfNotPresent

# Authentication - password stored in sealed secret
auth:
  # Sealed secret name containing the PASSWORD env var
  secretName: code-server-auth
  # Set to empty string to disable password auth (not recommended)
  # Password is configured via sealed secret

# Resource limits appropriate for homelab
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 4
    memory: 4Gi

# Persistence configuration
persistence:
  # Workspace data (code, projects, etc.)
  workspace:
    enabled: true
    size: 50Gi
    storageClass: longhorn
    accessMode: ReadWriteOnce

  # VS Code config and extensions
  config:
    enabled: true
    size: 10Gi
    storageClass: longhorn
    accessMode: ReadWriteOnce

# Ingress configuration
ingress:
  enabled: true
  host: claude.k8s.firekatt.ca
  ingressClassName: internal
  annotations: {}

# Service configuration
service:
  type: ClusterIP
  port: 8443

# LinuxServer.io image environment
linuxserver:
  puid: 1000
  pgid: 1000
  tz: "America/Toronto"

# Claude Code configuration
claudeCode:
  # Enable Claude Code CLI installation
  enabled: true
  # Anthropic API key stored in sealed secret
  apiKeySecret: code-server-anthropic-key
  # Claude Code settings
  settings:
    # Default model to use
    model: "claude-sonnet-4-20250514"
    # Auto-accept mode (use with caution)
    autoAccept: false

# Additional VS Code extensions to install (by ID)
extensions:
  - ms-kubernetes-tools.vscode-kubernetes-tools
  - hashicorp.terraform
  - redhat.vscode-yaml
  - ms-azuretools.vscode-docker
  - eamodio.gitlens
  - esbenp.prettier-vscode
  - golang.go
  - rust-lang.rust-analyzer

# Git configuration
git:
  # Pre-configure git repos to clone
  repositories:
    - name: homelab
      url: https://github.com/FireBall1725/homelab-applications.git
    - name: homelab-config
      url: https://github.com/FireBall1725/homelab-config.git
  # Git user config (optional, can be configured later)
  user:
    name: ""
    email: ""

# RBAC configuration for cluster access
rbac:
  # Create ClusterRole and ClusterRoleBinding
  create: true
  # Cluster role rules - admin access for homelab management
  rules:
    - apiGroups: ["*"]
      resources: ["*"]
      verbs: ["*"]

# Service account
serviceAccount:
  create: true
  name: code-server
  annotations: {}

# Pod configuration
pod:
  annotations: {}
  labels: {}

# Node selection
nodeSelector: {}
tolerations: []
affinity: {}

# Startup script customizations
customStartup: |
  # Install Claude Code CLI
  echo "Installing Claude Code CLI..."
  npm install -g @anthropic-ai/claude-code || true

  # Install additional CLI tools
  echo "Installing additional tools..."

  # Install kubectl
  if ! command -v kubectl &> /dev/null; then
    curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    chmod +x kubectl
    sudo mv kubectl /usr/local/bin/
  fi

  # Install helm
  if ! command -v helm &> /dev/null; then
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  fi

  # Install kubeseal
  if ! command -v kubeseal &> /dev/null; then
    KUBESEAL_VERSION=$(curl -s https://api.github.com/repos/bitnami-labs/sealed-secrets/releases/latest | grep tag_name | cut -d '"' -f 4)
    curl -OL "https://github.com/bitnami-labs/sealed-secrets/releases/download/${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION#v}-linux-amd64.tar.gz"
    tar -xvzf kubeseal-*.tar.gz kubeseal
    sudo mv kubeseal /usr/local/bin/
    rm kubeseal-*.tar.gz
  fi

  # Install talosctl
  if ! command -v talosctl &> /dev/null; then
    curl -sL https://talos.dev/install | sh
  fi

  # Clone git repositories
  cd /config/workspace
  for repo in homelab homelab-config; do
    if [ ! -d "$repo" ]; then
      echo "Cloning $repo..."
      git clone https://github.com/FireBall1725/${repo}.git || true
    fi
  done

  echo "Setup complete!"
