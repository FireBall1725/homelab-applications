# PLACEHOLDER SealedSecret - DO NOT DEPLOY AS-IS.
#
# The encryptedData values below are NOT real sealed values; they are the literal
# string PLACEHOLDER... and the SealedSecrets controller cannot decrypt them.
# This chart must NOT be synced/merged until the values are replaced.
#
# How to fill this in (do this once, on the machine that has kubeseal + the
# cluster's public cert):
#
#   1. Run the pcexpress-mcp-server helper `login_pcid.py` ONCE to mint a refresh
#      token dedicated to this k8s instance. Do not reuse a token that is already
#      in use elsewhere - it is single-use and rotates on every refresh, so a
#      shared token would break both consumers with `invalid_grant`.
#
#   2. Build the real Secret and kubeseal it over top of this file, e.g.:
#
#        kubectl create secret generic pcexpress-mcp \
#          --namespace=app-pcexpress \
#          --from-literal=PCEXPRESS_REFRESH_TOKEN='<token from login_pcid.py>' \
#          --from-literal=PCEXPRESS_BANNER='zehrs' \
#          --from-literal=PCEXPRESS_STORE_ID='<your store id>' \
#          --from-literal=PCEXPRESS_MCP_BEARER='<optional inbound bearer>' \
#          --dry-run=client -o yaml | \
#          kubeseal --format yaml \
#          > pcexpress-mcp/templates/sealed-secret-refresh-token.yaml
#
#      Drop the PCEXPRESS_MCP_BEARER line if you do not want inbound bearer auth;
#      the env in values.yaml marks that key optional.
#
#   3. Commit the regenerated (real) SealedSecret. See ../SECRETS.md.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: pcexpress-mcp
  namespace: app-pcexpress
spec:
  encryptedData:
    # Replace every value below with real kubeseal output (see header).
    PCEXPRESS_REFRESH_TOKEN: PLACEHOLDER_REPLACE_WITH_KUBESEAL_OUTPUT
    PCEXPRESS_BANNER: PLACEHOLDER_REPLACE_WITH_KUBESEAL_OUTPUT
    PCEXPRESS_STORE_ID: PLACEHOLDER_REPLACE_WITH_KUBESEAL_OUTPUT
    PCEXPRESS_MCP_BEARER: PLACEHOLDER_REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: pcexpress-mcp
      namespace: app-pcexpress
    type: Opaque
