apiVersion: v1
kind: ConfigMap
metadata:
  name: unpoller-config
  namespace: app-unpoller
data:
  unpoller.conf: |
    [poller]
      debug = false
      quiet = false
      plugins = []

    [prometheus]
      disable = false
      http_listen = "0.0.0.0:9130"
      report_errors = false

    [influxdb]
      disable = true

    [loki]
      url = ""

    [datadog]
      disable = true

    [webserver]
      enable = false

    [unifi]
      dynamic = false

    [unifi.defaults]
      url = "https://10.0.1.254"
      user = "${UNIFI_USER}"
      pass = "${UNIFI_PASS}"
      sites = ["all"]
      save_sites = true
      hash_pii = false
      save_ids = false
      save_events = false
      save_alarms = false
      save_anomalies = false
      save_dpi = true
      save_rogue = false
      verify_ssl = false
